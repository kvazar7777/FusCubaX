<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FusCubaX - Браузерный мессенджер</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <div id="app">
        <div id="auth-container" class="auth-container">
            <div class="auth-card">
                <h1>FusCubaX Messenger</h1>
                
                <!-- Форма регистрации -->
                <form id="register-form" class="auth-form" style="display: none;">
                    <h2>Регистрация</h2>
                    <input type="text" id="reg-username" placeholder="Имя пользователя" required>
                    <input type="email" id="reg-email" placeholder="Email" required>
                    <input type="password" id="reg-password" placeholder="Пароль" required>
                    <input type="password" id="reg-confirm" placeholder="Подтвердите пароль" required>
                    <button type="submit">Зарегистрироваться</button>
                    <p>Уже есть аккаунт? <a href="#" onclick="switchForm('login')">Войти</a></p>
                </form>

                <!-- Форма входа -->
                <form id="login-form" class="auth-form">
                    <h2>Вход</h2>
                    <input type="text" id="login-username" placeholder="Имя пользователя" required>
                    <input type="password" id="login-password" placeholder="Пароль" required>
                    <button type="submit">Войти</button>
                    <p>Нет аккаунта? <a href="#" onclick="switchForm('register')">Зарегистрироваться</a></p>
                </form>

                <div id="auth-message" class="auth-message"></div>
            </div>
        </div>

        <div id="main-container" class="main-container" style="display: none;">
            <!-- Боковая панель -->
            <aside class="sidebar">
                <div class="user-profile">
                    <div class="user-avatar"></div>
                    <div class="user-info">
                        <div class="user-name"></div>
                        <button id="logout-btn" class="logout-btn">Выход</button>
                    </div>
                </div>

                <nav class="sidebar-nav">
                    <button class="nav-btn active" data-section="chats">💬 Чаты</button>
                    <button class="nav-btn" data-section="friends">👥 Друзья</button>
                    <button class="nav-btn" data-section="find-friends">🔍 Найти друзей</button>
                    <button class="nav-btn" data-section="profile">⚙️ Профиль</button>
                </nav>

                <div class="chats-list">
                    <h3>Разговоры</h3>
                    <div id="chats-container"></div>
                </div>
            </aside>

            <!-- Основная область -->
            <main class="main-content">
                <!-- Секция чатов -->
                <section id="chats-section" class="content-section active">
                    <div class="chat-area">
                        <div class="chat-empty">
                            <p>Выберите разговор или найдите друзей</p>
                        </div>
                    </div>
                </section>

                <!-- Секция друзей -->
                <section id="friends-section" class="content-section" style="display: none;">
                    <div class="friends-area">
                        <h2>Мои друзья</h2>
                        <div id="friends-list" class="friends-list"></div>
                    </div>
                </section>

                <!-- Секция поиска друзей -->
                <section id="find-friends-section" class="content-section" style="display: none;">
                    <div class="find-friends-area">
                        <h2>Найти друзей</h2>
                        <input type="text" id="search-input" placeholder="Поиск по имени пользователя...">
                        <div id="search-results" class="search-results"></div>
                    </div>
                </section>

                <!-- Секция профиля -->
                <section id="profile-section" class="content-section" style="display: none;">
                    <div class="profile-area">
                        <h2>Мой профиль</h2>
                        <form id="profile-form">
                            <div class="profile-field">
                                <label>Имя пользователя</label>
                                <input type="text" id="profile-username" disabled>
                            </div>
                            <div class="profile-field">
                                <label>Email</label>
                                <input type="email" id="profile-email" disabled>
                            </div>
                            <div class="profile-field">
                                <label>О себе</label>
                                <textarea id="profile-bio" placeholder="Расскажите о себе..."></textarea>
                            </div>
                            <button type="submit">Сохранить изменения</button>
                        </form>
                    </div>
                </section>
            </main>
        </div>
    </div>

    <script src="db/database.js"></script>
    <script src="auth/auth.js"></script>
    <script src="friends/friends.js"></script>
    <script src="manager.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
